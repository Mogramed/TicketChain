services:
  postgres:
    image: postgres:16-alpine
    container_name: chainticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chainticket
    ports:
      - "5432:5432"
    volumes:
      - chainticket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chainticket"]
      interval: 5s
      timeout: 5s
      retries: 20

  bff:
    build:
      context: ./bff
    container_name: chainticket-bff
    restart: unless-stopped
    env_file:
      - ./bff/.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8787
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chainticket
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8787:8787"

volumes:
  chainticket_pgdata:
