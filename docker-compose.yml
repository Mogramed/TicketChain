services:
  postgres:
    image: postgres:16-alpine
    container_name: chainticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chainticket
    ports:
      - "5432:5432"
    volumes:
      - chainticket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chainticket"]
      interval: 5s
      timeout: 5s
      retries: 20

  bff:
    build:
      context: ./bff
    container_name: chainticket-bff
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8787
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chainticket
      AMOY_RPC_URL: ${AMOY_RPC_URL:-https://rpc-amoy.polygon.technology}
      CHAIN_ID: 80002
      DEPLOYMENT_BLOCK: ${DEPLOYMENT_BLOCK:-0}
      TICKET_NFT_ADDRESS: ${TICKET_NFT_ADDRESS:-0x0000000000000000000000000000000000000000}
      MARKETPLACE_ADDRESS: ${MARKETPLACE_ADDRESS:-0x0000000000000000000000000000000000000000}
      CHECKIN_REGISTRY_ADDRESS: ${CHECKIN_REGISTRY_ADDRESS:-0x0000000000000000000000000000000000000000}
      INDEXER_BATCH_SIZE: ${INDEXER_BATCH_SIZE:-400}
      INDEXER_MIN_BATCH_SIZE: ${INDEXER_MIN_BATCH_SIZE:-60}
      INDEXER_POLL_INTERVAL_MS: ${INDEXER_POLL_INTERVAL_MS:-4000}
      INDEXER_INTER_BATCH_DELAY_MS: ${INDEXER_INTER_BATCH_DELAY_MS:-100}
      INDEXER_CONFIRMATIONS: 0
      INDEXER_RATE_LIMIT_COOLDOWN_MS: 8000
      INDEXER_MAX_BACKOFF_MS: 120000
      INDEXER_MAX_CONSECUTIVE_RATE_LIMITS: 8
      INDEXER_STOP_ON_MAX_RATE_LIMIT: true
      CORS_ORIGINS: http://localhost:5173
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-160}
    ports:
      - "8787:8787"

volumes:
  chainticket_pgdata:
